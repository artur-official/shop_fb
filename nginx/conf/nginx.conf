worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # === HTTP → HTTPS redirect ===
    server {
        listen       80;
        server_name  ingria-farm.com www.ingria-farm.com;

        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # === HTTPS server ===
    server {
        listen       443 ssl;
        server_name  ingria-farm.com www.ingria-farm.com;

        # SSL certificates (Cloudflare Origin CA)
        ssl_certificate      C:/nginx/ssl/ingria-farm.crt;
        ssl_certificate_key  C:/nginx/ssl/ingria-farm.key;
        ssl_protocols        TLSv1.2 TLSv1.3;
        ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers  off;

        # Web App (static files)
        location / {
            root   C:/Users/Administrator/Desktop/fb-shop/webapp;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # API proxy
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Webhook
        location /webhook/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Health check
        location /health {
            proxy_pass http://127.0.0.1:8000;
        }
    }
}