<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Admin Panel - FB Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-header { background: linear-gradient(135deg, #ef4444 0%, #f59e0b 100%); }
        .stat-card { background: var(--bg-card); border-radius: var(--radius); padding: 16px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--accent-hover); }
        .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
        .admin-btn { background: var(--accent-gradient); border: none; border-radius: var(--radius-sm); padding: 14px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .admin-btn.danger { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-size: 14px; color: var(--text-secondary); }
        .form-input { width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text-primary); font-size: 14px; }
        .form-input:focus { border-color: var(--accent); outline: none; }
        .product-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-card); border-radius: var(--radius-sm); margin-bottom: 8px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; }
        .tab { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 20px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--accent-gradient); color: white; border-color: var(--accent); }
    </style>
</head>
<body>
    <div id="app">
        <header class="header admin-header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🔐</span>
                    <span class="logo-text">Admin Panel</span>
                </div>
            </div>
        </header>

        <main class="main">
            <div id="adminScreen" class="screen active">
                <div class="tabs">
                    <div class="tab active" onclick="showTab('stats')">Статистика</div>
                    <div class="tab" onclick="showTab('products')">Товары</div>
                    <div class="tab" onclick="showTab('orders')">Заказы</div>
                    <div class="tab" onclick="showTab('add')">Добавить</div>
                </div>

                <!-- Stats Tab -->
                <div id="statsTab" class="tab-content">
                    <div class="categories-grid" style="grid-template-columns: repeat(2, 1fr);">
                        <div class="stat-card">
                            <div class="stat-value" id="statProducts">0</div>
                            <div class="stat-label">Товаров</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="statAvailable">0</div>
                            <div class="stat-label">Доступно</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="statOrders">0</div>
                            <div class="stat-label">Заказов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value" id="statRevenue">0</div>
                            <div class="stat-label">Выручка USDT</div>
                        </div>
                    </div>
                </div>

                <!-- Products Tab -->
                <div id="productsTab" class="tab-content" style="display:none;">
                    <div id="adminProductsList"></div>
                </div>

                <!-- Orders Tab -->
                <div id="ordersTab" class="tab-content" style="display:none;">
                    <div id="adminOrdersList"></div>
                </div>

                <!-- Add Product Tab -->
                <div id="addTab" class="tab-content" style="display:none;">
                    <h3 class="section-title">Добавить товар</h3>
                    <div class="form-group">
                        <label class="form-label">Название</label>
                        <input class="form-input" id="addTitle" placeholder="Farm-akkaunt Facebook USA">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Категория</label>
                        <select class="form-input" id="addCategory">
                            <option value="farm">Фарм-аккаунт</option>
                            <option value="bm">Business Manager</option>
                            <option value="launch">С запуском</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Страна</label>
                        <select class="form-input" id="addCountry">
                            <option value="usa">США</option>
                            <option value="uk">Великобритания</option>
                            <option value="eu">Европа</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Возраст</label>
                        <select class="form-input" id="addAge">
                            <option value="1-3">1-3 месяца</option>
                            <option value="3-6">3-6 месяцев</option>
                            <option value="6+">6+ месяцев</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Цена (USDT)</label>
                        <input class="form-input" id="addPrice" type="number" placeholder="25">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Бейдж</label>
                        <input class="form-input" id="addBadge" placeholder="Популярный">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Логин</label>
                        <input class="form-input" id="addLogin" placeholder="email@gmail.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Пароль</label>
                        <input class="form-input" id="addPassword" placeholder="password123">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cookies файл</label>
                        <input class="form-input" id="addCookies" placeholder="cookies.json">
                    </div>
                    <div class="form-group">
                        <label class="form-label">2FA код</label>
                        <input class="form-input" id="add2FA" placeholder="123456 (или оставь пустым)">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Описание</label>
                        <textarea class="form-input" id="addDescription" rows="3" placeholder="Описание товара..."></textarea>
                    </div>
                    <button class="admin-btn" onclick="addProduct()">Добавить товар</button>
                </div>
            </div>

            <!-- Access Denied -->
            <div id="accessDenied" class="screen" style="text-align:center; padding-top:100px;">
                <div style="font-size:64px;">🚫</div>
                <h2>Доступ запрещён</h2>
                <p style="color:var(--text-muted);">У вас нет прав администратора</p>
            </div>
        </main>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.setHeaderColor('#0a0a0f');
        tg.setBackgroundColor('#0a0a0f');

        let userId = tg.initDataUnsafe?.user?.id;
        let isAdmin = false;

        async function checkAdmin() {
            try {
                let res = await fetch('/api/admin/check/' + userId);
                let data = await res.json();
                isAdmin = data.is_admin;

                if (!isAdmin) {
                    document.getElementById('adminScreen').classList.remove('active');
                    document.getElementById('accessDenied').classList.add('active');
                } else {
                    loadStats();
                }
            } catch(e) {
                console.error(e);
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').style.display = 'block';

            if (tab === 'stats') loadStats();
            if (tab === 'products') loadAdminProducts();
            if (tab === 'orders') loadAdminOrders();
        }

        async function loadStats() {
            try {
                let res = await fetch('/api/admin/stats?user_id=' + userId);
                let data = await res.json();
                document.getElementById('statProducts').textContent = data.total_products;
                document.getElementById('statAvailable').textContent = data.available_products;
                document.getElementById('statOrders').textContent = data.total_orders;
                document.getElementById('statRevenue').textContent = data.total_revenue;
            } catch(e) { console.error(e); }
        }

        async function loadAdminProducts() {
            try {
                let res = await fetch('/api/admin/products?user_id=' + userId);
                let data = await res.json();
                let html = '';
                data.products.forEach(p => {
                    let status = p.status === 'available' ? 'Доступно' : 'Продано';
                    html += '<div class="product-row">';
                    html += '<div><b>#' + p.id + '</b> ' + p.title + '<br><small>' + p.price + ' USDT | ' + status + '</small></div>';
                    html += '<button class="btn btn-secondary" style="width:auto;padding:8px 12px;" onclick="editProduct(' + p.id + ')">Изменить</button>';
                    html += '</div>';
                });
                document.getElementById('adminProductsList').innerHTML = html || '<p style="color:var(--text-muted);text-align:center;">Товаров нет</p>';
            } catch(e) { console.error(e); }
        }

        async function loadAdminOrders() {
            try {
                let res = await fetch('/api/admin/orders?user_id=' + userId);
                let data = await res.json();
                let html = '';
                data.orders.forEach(o => {
                    let status = o.status === 'paid' ? '✅ Оплачен' : '⏳ Ожидание';
                    html += '<div class="product-row">';
                    html += '<div><b>' + o.order_id + '</b><br><small>' + o.total + ' USDT | ' + status + ' | ' + o.created_at + '</small></div>';
                    html += '</div>';
                });
                document.getElementById('adminOrdersList').innerHTML = html || '<p style="color:var(--text-muted);text-align:center;">Заказов нет</p>';
            } catch(e) { console.error(e); }
        }

        async function addProduct() {
            let product = {
                user_id: userId,
                title: document.getElementById('addTitle').value,
                category: document.getElementById('addCategory').value,
                country: document.getElementById('addCountry').value,
                age: document.getElementById('addAge').value,
                price: parseFloat(document.getElementById('addPrice').value),
                badge: document.getElementById('addBadge').value,
                login: document.getElementById('addLogin').value,
                password: document.getElementById('addPassword').value,
                cookies: document.getElementById('addCookies').value,
                two_fa: document.getElementById('add2FA').value || null,
                description: document.getElementById('addDescription').value,
                specs: {
                    'Страна': document.getElementById('addCountry').options[document.getElementById('addCountry').selectedIndex].text,
                    'Возраст': document.getElementById('addAge').options[document.getElementById('addAge').selectedIndex].text,
                    'Тип': document.getElementById('addCategory').options[document.getElementById('addCategory').selectedIndex].text
                }
            };

            try {
                let res = await fetch('/api/admin/products', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(product)
                });
                let data = await res.json();
                if (data.success) {
                    tg.showAlert('Товар добавлен! ID: ' + data.product_id);
                    // Clear form
                    document.querySelectorAll('.form-input').forEach(i => i.value = '');
                }
            } catch(e) { console.error(e); }
        }

        checkAdmin();
    </script>
</body>
</html>
