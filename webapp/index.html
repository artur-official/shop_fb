<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INGRIAFARM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css?v=2">
<base target="_blank">
</head>
<body>
    <div id="app">
        <!-- Шапка -->
        <header class="header">
            <div class="header-content">
                <div class="logo">INGRIAFARM</div>
                <button class="cart-btn" onclick="showCart()">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-count" id="cartCount">0</span>
                </button>
            </div>
        </header>

        <main class="main">
            <!-- Home -->
            <div id="homeScreen" class="screen active">
                <div class="hero">
                    <h1>Аккаунты Facebook для рекламы</h1>
                    <p>Качественные фарм-аккаунты, БМ и аккаунты с запуском</p>
                </div>
                <div class="categories">
                    <div class="category-card" onclick="filterCategory('farm')">
                        <div class="category-icon">🌱</div>
                        <div class="category-name">Фарм-аккаунты</div>
                    </div>
                    <div class="category-card" onclick="filterCategory('bm')">
                        <div class="category-icon">💼</div>
                        <div class="category-name">Business Manager</div>
                    </div>
                    <div class="category-card" onclick="filterCategory('launch')">
                        <div class="category-icon">🚀</div>
                        <div class="category-name">С запуском</div>
                    </div>
                    <div class="category-card" onclick="filterCategory('all')">
                        <div class="category-icon">📋</div>
                        <div class="category-name">Все аккаунты</div>
                    </div>
                </div>
            </div>

            <!-- Catalog -->
            <div id="catalogScreen" class="screen">
                <div class="screen-header">
                    <button class="back-btn" onclick="showHome()">←</button>
                    <h2 id="catalogTitle">Каталог</h2>
                </div>
                <div class="filters">
                    <select id="countryFilter" onchange="applyFilters()">
                        <option value="all">Все страны</option>
                        <option value="usa">🇺🇸 США</option>
                        <option value="uk">🇬🇧 UK</option>
                        <option value="eu">🇪🇺 Европа</option>
                    </select>
                    <select id="ageFilter" onchange="applyFilters()">
                        <option value="all">Любой возраст</option>
                        <option value="1-3">1-3 мес</option>
                        <option value="3-6">3-6 мес</option>
                        <option value="6+">6+ мес</option>
                    </select>
                </div>
                <div class="products-grid" id="productsGrid"></div>
            </div>

            <!-- Product -->
            <div id="productScreen" class="screen">
                <div class="screen-header">
                    <button class="back-btn" onclick="showCatalog()">←</button>
                </div>
                <div id="productDetail"></div>
            </div>

            <!-- Cart -->
            <div id="cartScreen" class="screen">
                <div class="screen-header">
                    <button class="back-btn" onclick="showHome()">←</button>
                    <h2>Корзина</h2>
                </div>
                <div id="cartContent"></div>
            </div>

            <!-- Checkout -->
            <div id="checkoutScreen" class="screen">
                <div class="screen-header">
                    <button class="back-btn" onclick="showCart()">←</button>
                    <h2>Оформление</h2>
                </div>
                <div class="checkout-total" id="checkoutTotal">0 USDT</div>
                <button class="btn btn-primary" onclick="processPayment()">Оплатить</button>
            </div>

            <!-- Success -->
            <div id="successScreen" class="screen">
                <div class="success-content">
                    <div class="success-icon">✅</div>
                    <h2>Успешно!</h2>
                    <button class="btn btn-primary" onclick="showProfile()">В профиль</button>
                </div>
            </div>

            <!-- Profile -->
            <div id="profileScreen" class="screen">
                <div class="screen-header">
                    <button class="back-btn" onclick="showHome()">←</button>
                    <h2>INGRIAFARM</h2>
                </div>
                <div class="profile-hero">
                    <div class="profile-greeting">Привет, <span id="userName">Artur</span>!</div>
                    <div class="profile-deposit-btn" onclick="showDeposit()">+ ПОПОЛНИТЬ БАЛАНС</div>
                    <div class="profile-balance" id="profileBalance">0.00$</div>
                </div>
                <div class="profile-menu">
                    <button class="profile-menu-btn" onclick="showProfileTab('purchases')">
                        <span>🛒</span> Мои покупки
                    </button>
                    <button class="profile-menu-btn" onclick="showProfileTab('payments')">
                        <span>📋</span> Платежи
                    </button>
                </div>
                <div class="profile-tab-content" id="purchasesTab">
                    <div id="purchasesContent"></div>
                </div>
                <div class="profile-tab-content" id="paymentsTab">
                    <div id="paymentsContent"></div>
                </div>

                <!-- Deposit Screen (hidden by default) -->
                <div id="depositScreen" class="profile-tab-content">
                    <div id="depositContent"></div>
                </div>
            </div>
        </main>

        <!-- Навигация -->
        <nav class="bottom-nav">
            <button class="nav-btn active" onclick="showHome()">
                <span class="nav-icon">🏠</span>
                <span>Главная</span>
            </button>
            <button class="nav-btn" onclick="showCatalog()">
                <span class="nav-icon">📦</span>
                <span>Каталог</span>
            </button>
            <button class="nav-btn" onclick="showCart()">
                <span class="nav-icon">🛒</span>
                <span>Корзина</span>
                <span class="nav-badge" id="navBadge">0</span>
            </button>
            <button class="nav-btn" onclick="showProfile()">
                <span class="nav-icon">👤</span>
                <span>Профиль</span>
            </button>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
